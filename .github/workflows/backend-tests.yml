name: Backend Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-rbac-fallback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend RBAC and API fallback tests
        run: |
          python -m unittest discover -s backend/tests -p "test_rbac_*.py" -v
          python -m unittest discover -s backend/tests -p "test_api_fallback_404.py" -v

  backend-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend payload validation tests
        run: |
          python -m unittest discover -s backend/tests -p "test_validation_*.py" -v
